x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOGGING: "False"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./spark_jobs:/opt/spark_jobs
    - ./logs:/opt/airflow/logs

  depends_on:
    airflow-postgres:
      condition: service_healthy

services:

  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    user: "0:0"

    entrypoint: /bin/bash

    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver

    command: webserver

    ports:
      - "8088:8080"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5

    depends_on:
      airflow-init:
        condition: service_completed_successfully

      airflow-postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler

    command: scheduler

    depends_on:
      airflow-init:
        condition: service_completed_successfully

      airflow-postgres:
        condition: service_healthy

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    hostname: spark-master

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ./data:/home/jovyan/work/data

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    hostname: spark-worker
    user: "0:0"

    depends_on:
      - spark-master

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g

    volumes:
      - ./data:/home/jovyan/work/data
      - spark-warehouse:/home/jovyan/work/warehouse

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    user: "0:0"

    environment:
      CHOWN_EXTRA: /home/jovyan/work/warehouse
      CHOWN_EXTRA_OPTS: -R

    command: >
      start-notebook.py
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.allow_remote_access=True

    ports:
      - "8888:8888"

    volumes:
      - ./data:/home/jovyan/work/data
      - ./spark_jobs:/home/jovyan/work/spark_jobs
      - spark-warehouse:/home/jovyan/work/warehouse

  spark:
    image: bitnami/spark:latest
    container_name: spark

    environment:
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"

    ports:
      - "7078:7078"
      - "8081:8081"

    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data

volumes:
  airflow-postgres-db:
  spark-warehouse: